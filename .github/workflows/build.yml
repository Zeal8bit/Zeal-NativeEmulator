name: Build All Platforms

on:
  push:
    branches:
      - main
      - build-deploy
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-linux:
    name: Build Linux
    uses: ./.github/workflows/build-linux.yml

  build-macos-arm:
    name: Build Mac OS ARM
    uses: ./.github/workflows/build-macos-arm.yml

  build-macos-intel:
    name: Build Mac OS Intel
    uses: ./.github/workflows/build-macos-intel.yml

  build-windows:
    name: Build Windows
    uses: ./.github/workflows/build-windows.yml

  build-wasm:
    name: Build WebAssembly
    uses: ./.github/workflows/build-wasm.yml

  build-rpi:
    name: Build Raspberry Pi
    uses: ./.github/workflows/build-rpi.yml

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download WASM Artifacts
        uses: actions/download-artifact@v4
        with:
          name: zeal-native-wasm
          path: ./wasm-build

      - name: Deploy to GitHub Pages
        uses: ./.github/actions/deploy-pages
        with:
          deploy-path: ./wasm-build

  create-release:
    name: Create Draft Release
    needs: [build-linux, build-macos-arm, build-macos-intel, build-windows, build-wasm, build-rpi]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: zeal-native-linux
          path: ./artifacts/linux

      - name: Download macOS ARM Artifact
        uses: actions/download-artifact@v4
        with:
          name: zeal-native-macos-arm
          path: ./artifacts/macos-arm

      - name: Download macOS Intel Artifact
        uses: actions/download-artifact@v4
        with:
          name: zeal-native-macos-intel
          path: ./artifacts/macos-intel

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: zeal-native-windows
          path: ./artifacts/windows

      - name: Download WASM Artifact
        uses: actions/download-artifact@v4
        with:
          name: zeal-native-wasm
          path: ./artifacts/wasm

      - name: Download Raspberry Pi ARMv6 Artifact
        uses: actions/download-artifact@v4
        with:
          name: zeal-native-rpi-armv6
          path: ./artifacts/rpi-armv6

      - name: Download Raspberry Pi ARMv7 Artifact
        uses: actions/download-artifact@v4
        with:
          name: zeal-native-rpi-armv7
          path: ./artifacts/rpi-armv7

      - name: Download Raspberry Pi ARM64 Artifact
        uses: actions/download-artifact@v4
        with:
          name: zeal-native-rpi-arm64
          path: ./artifacts/rpi-arm64

      - name: Create Release Archives
        run: |
          cd artifacts/linux
          tar -czf ../../zeal-native-linux-x64.tar.gz zeal-native
          cd ../macos-arm
          tar -czf ../../zeal-native-macos-arm.tar.gz zeal-native
          cd ../macos-intel
          tar -czf ../../zeal-native-macos-intel.tar.gz zeal-native
          cd ../windows
          zip ../../zeal-native-windows-x64.zip zeal-native.exe
          cd ../wasm
          zip -r ../../zeal-native-wasm.zip .
          cd ../rpi-armv6
          tar -czf ../../zeal-native-rpi-armv6.tar.gz zeal-native.armv6 lib
          cd ../rpi-armv7
          tar -czf ../../zeal-native-rpi-armv7.tar.gz zeal-native.armv7 lib
          cd ../rpi-arm64
          tar -czf ../../zeal-native-rpi-arm64.tar.gz zeal-native.arm64 lib
          cd ../..

      - name: Generate Release Info
        id: tag
        run: |
          echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "release_date=$(date -u +"%Y-%m-%d %H:%M UTC")" >> $GITHUB_OUTPUT

      - name: Delete Existing Draft Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "latest" --yes || true

      - name: Create or Update Latest Release
        uses: softprops/action-gh-release@v2
        with:
          name: Latest build (${{ steps.tag.outputs.sha }})
          body: |
            Built from commit: ${{ steps.tag.outputs.sha }}
            Branch: ${{ github.ref_name }}
            Date: ${{ steps.tag.outputs.release_date }}
          tag_name: latest
          preserve_order: true
          generate_release_notes: false
          files: |
            zeal-native-linux-x64.tar.gz
            zeal-native-macos-arm.tar.gz
            zeal-native-macos-intel.tar.gz
            zeal-native-windows-x64.zip
            zeal-native-wasm.zip
            zeal-native-rpi-armv6.tar.gz
            zeal-native-rpi-armv7.tar.gz
            zeal-native-rpi-arm64.tar.gz
